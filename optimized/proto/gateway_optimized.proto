syntax = "proto3";

package gateway.optimized.v1;

option go_package = "iot/optimized/proto;optimizedpb";

// 紧凑的指标结构（替代 map<string, double>）
message Metric {
  uint32 id = 1;       // 预定义 ID: 1=temp, 2=humidity, 100+=vibration
  float value = 2;     // 用 float 替代 double，省一半空间
}

// 单条遥测样本（用于批量上报）
message TelemetrySample {
  int64 timestamp_ms = 1;
  repeated Metric metrics = 2;
}

// 单条遥测消息（用于流式和单次上报）
message Telemetry {
  string device_id = 1;
  int64 timestamp_ms = 2;
  repeated Metric metrics = 3;
  double client_avg = 4;
  uint32 priority = 5;       // 0=背景流量, 1=列车实时流量
}

// 批量遥测消息
message BatchTelemetry {
  string device_id = 1;
  repeated TelemetrySample samples = 2;
  double client_avg = 3;
  uint32 priority = 4;
}

// 遥测响应
message TelemetryAck {
  string status = 1;
  string message = 2;
  double server_avg = 3;
  double client_avg = 4;
  double diff = 5;
  bool verified = 6;
  uint64 received_count = 7;   // 收到的样本数（用于批量/流式）
}

// 流式上报的最终响应
message StreamAck {
  uint64 received_count = 1;
  string status = 2;
  double server_avg = 3;
  bool verified = 4;
}

// 健康检查
message HealthCheckRequest {
  string message = 1;
}

message HealthCheckResponse {
  string status = 1;
  uint64 high_priority_queue_len = 2;
  uint64 low_priority_queue_len = 3;
}

// 优化版 IoT 边缘网关 gRPC 接口
service OptimizedEdgeGatewayService {
  // 单次上报（兼容简单场景）
  rpc PublishTelemetry(Telemetry) returns (TelemetryAck);

  // 批量上报（多条样本合并）
  rpc PublishBatchTelemetry(BatchTelemetry) returns (TelemetryAck);

  // 流式上报（客户端流，长连接持续上报）
  rpc StreamTelemetry(stream Telemetry) returns (StreamAck);

  // 健康检查
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}
